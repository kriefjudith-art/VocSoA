<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Pitch Agency Experiment</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #87CEEB; /* Sky blue */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            overflow: hidden;
        }
        #ui-container {
            position: absolute;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        h1 {
            color: #FF4500;
            margin-top: 0;
        }
        button {
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            background-color: #FF1493; /* Hot pink */
            color: white;
            border: none;
            border-radius: 50px;
            transition: transform 0.2s;
            box-shadow: 0 6px 0 #C71585;
        }
        button:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #C71585;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>🐥 Baby Bird Voice Game</h1>
        <p>Make sounds to fly!</p>
        <button id="startButton">Start Microphone</button>
    </div>
    
    <canvas id="visualizer"></canvas>

    <script>
        const startButton = document.getElementById('startButton');
        const uiContainer = document.getElementById('ui-container');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // Resize canvas to fill the screen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let audioContext, analyser, microphone;
        
        // --- BABY SETTINGS ---
        const MIN_PITCH = 150; // Low grunts
        const MAX_PITCH = 800; // High squeals
        const SILENCE_THRESHOLD = 0.01; // Slightly more sensitive
        
        // Game state
        let bird = { x: 100, y: canvas.height / 2, angle: 0 };
        let targetY = canvas.height / 2;
        let trajectoryPath = [];
        let clouds = [
            { x: 200, y: 100, speed: 0.5, scale: 1 },
            { x: 800, y: 250, speed: 0.8, scale: 1.5 },
            { x: 1200, y: 150, speed: 0.3, scale: 0.8 }
        ];

        startButton.addEventListener('click', async () => {
            if (audioContext) return; 

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048; 
                
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                // Hide the UI so the baby focuses on the bird
                uiContainer.style.display = 'none';
                
                drawLoop();
            } catch (err) {
                console.error('Error accessing microphone:', err);
                alert('Could not access microphone.');
            }
        });

        // Pitch detection (Auto-correlation)
        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);

            if (rms < SILENCE_THRESHOLD) return -1; // Silence

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }

            buf = buf.slice(r1, r2);
            SIZE = buf.length;
            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            let T0 = maxpos;

            let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
            let a = (x1 + x3 - 2 * x2) / 2;
            let b = (x3 - x1) / 2;
            if (a) T0 = T0 - b / (2 * a);

            return sampleRate / T0;
        }

        // Draw fluffy clouds
        function drawClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            clouds.forEach(cloud => {
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, 40 * cloud.scale, 0, Math.PI * 2);
                ctx.arc(cloud.x + 40 * cloud.scale, cloud.y - 10 * cloud.scale, 50 * cloud.scale, 0, Math.PI * 2);
                ctx.arc(cloud.x + 80 * cloud.scale, cloud.y, 40 * cloud.scale, 0, Math.PI * 2);
                ctx.fill();
                
                // Move clouds slowly to the left
                cloud.x -= cloud.speed;
                if (cloud.x < -150) cloud.x = canvas.width + 100; // Wrap around
            });
        }

        function drawLoop() {
            requestAnimationFrame(drawLoop);

            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            const pitch = autoCorrelate(buffer, audioContext.sampleRate);

            let isVocalizing = false;

            if (pitch !== -1 && pitch > 80 && pitch < 1500) { // Sanity check on pitch bounds
                isVocalizing = true;
                
                // Move bird forward faster for a more exciting visual reward
                bird.x += 4; 

                // Map baby pitch to Y axis
                let normalizedPitch = (pitch - MIN_PITCH) / (MAX_PITCH - MIN_PITCH);
                normalizedPitch = Math.max(0.1, Math.min(0.9, normalizedPitch)); // Keep away from exact edges
                
                targetY = canvas.height - (normalizedPitch * canvas.height);

                trajectoryPath.push({ x: bird.x, y: bird.y });
            }

            // Smooth vertical movement
            let dy = targetY - bird.y;
            bird.y += dy * 0.15;

            // Tilt the bird based on if it's going up or down!
            // If going up (dy is negative), tilt up. If going down, tilt down.
            let targetAngle = isVocalizing ? (dy * 0.01) : 0;
            bird.angle += (targetAngle - bird.angle) * 0.2;

            // Screen wrapping for endless play
            if (bird.x > canvas.width + 50) {
                bird.x = 0;
                trajectoryPath = []; 
            }

            // --- DRAWING ---
            
            // Background
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw Sun
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(canvas.width - 100, 100, 60, 0, Math.PI * 2);
            ctx.fill();

            drawClouds();

            // Draw thick, bright trajectory line
            if (trajectoryPath.length > 0) {
                ctx.beginPath();
                ctx.moveTo(trajectoryPath[0].x, trajectoryPath[0].y);
                for (let i = 1; i < trajectoryPath.length; i++) {
                    ctx.lineTo(trajectoryPath[i].x, trajectoryPath[i].y);
                }
                ctx.strokeStyle = '#FF1493'; // Hot Pink
                ctx.lineWidth = 12;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                
                // Add an inner white line for a "candy" or glowing effect
                ctx.strokeStyle = '#FFFFFF'; 
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            // Draw the Baby Bird with tilt
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.angle);
            ctx.font = '100px Arial'; // Massive bird!
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🐥', 0, 0);
            ctx.restore();
        }
    </script>
</body>
</html>
