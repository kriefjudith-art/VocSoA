<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Pitch Agency - Research Edition (v15_04)</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <div id="pitch-hud" style="display: none;">
        <div class="hud-line">Pitch: <span id="hud-pitch">--</span> Hz</div>
        <div class="hud-line">Volume: <span id="hud-vol">--</span></div>

        <div class="hud-error" id="hud-error"></div>
    </div>
</head>
<body>

    <div id="ui-container">
        <h1>🐥 Baby Agency Study</h1>
        <div id="init-status" style="margin-bottom: 15px; font-weight: bold; color: #C71585;">Detecting next participant...</div>
        <div class="input-group">
            <label for="participantId">Participant ID:</label>
            <input type="text" id="participantId" readonly style="background: #f0f0f0;">
        </div>
        <div class="input-group">
            <label for="groupAssignment">Assigned Group:</label>
            <input type="text" id="groupAssignment" readonly style="background: #f0f0f0;">
        </div>
        <div id="yoke-warning" style="margin-bottom: 15px; color: #FF4500; font-size: 14px; display: none;">⚠️ Missing yoked trajectories for this group.</div>
        <button id="startButton" disabled>Loading...</button>
    </div>

    <button id="stopButton">Stop & Save Data</button>
    <!-- Webcam container disabled for v2.0
    <div id="webcam-container">
        <video id="webcam-preview" autoplay playsinline muted style="display: none;"></video>
        <canvas id="webcam-canvas" width="240" height="180" style="width: 100%; height: 100%; transform: scaleX(-1);"></canvas>
    </div>
    -->
    <canvas id="visualizer"></canvas>

    <script>
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const uiContainer = document.getElementById('ui-container');
        // const webcamPreview = document.getElementById('webcam-preview');
        // const webcamCanvas = document.getElementById('webcam-canvas');
        // const webcamCtx = webcamCanvas.getContext('2d');
        // const webcamContainer = document.getElementById('webcam-container');
        // const testEyetrackingCheckbox = document.getElementById('testEyetracking');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let audioContext, analyser, microphone, micStream;
        let participantId = "";
        let groupAssignment = "G1";
        let trialNumber = 1;
        let blockNumber = 1;
        let currentCondition = "C1";
        let yokedSource = { p_id: "Self_generated", trial_n: "N/A" };
        let yokedTrajectoryData = null;
        let yokedIndex = 0;
        
        const PHASES = { CALIBRATION: 'CALIBRATION', BASELINE: 'BASELINE', EXPLORATION: 'EXPLORATION', TEST: 'TEST' };
        let currentPhase = PHASES.CALIBRATION;
        let experimentStarted = false;
        let isTestPhase = false; // New flag for the 2s post-trial test
        let testPhaseStartTime = 0;
        
        // --- AUTO-INITIALIZATION ---
        async function initSession() {
            const statusEl = document.getElementById('init-status');
            const startBtn = document.getElementById('startButton');
            try {
                const res = await fetch('/api/init_participant');
                const data = await res.json();
                
                participantId = data.participant_id;
                groupAssignment = data.group;
                
                document.getElementById('participantId').value = participantId;
                document.getElementById('groupAssignment').value = groupAssignment;
                
                if (!data.yoked_available && groupAssignment !== 'SEED') {
                    document.getElementById('yoke-warning').style.display = 'block';
                } else {
                    startBtn.disabled = false;
                    startBtn.innerText = "Start Experiment";
                }
                statusEl.innerText = "Ready to start.";
            } catch (err) {
                console.error(err);
                statusEl.innerText = "Error connecting to server.";
            }
        }
        window.addEventListener('load', initSession);
        let isTestIntro = false;
        let testIntroAnimal = null;

        // --- IMPROVED PITCH SETTINGS ---
        const MIN_PITCH = 220; 
        const MAX_PITCH = 1500; 
        const APERIODICITY_THRESHOLD = 0.2; 
        const VOLUME_THRESHOLD = 0.01; 
        let pitchHistory = []; 
        
        let balloon = { x: 100, y: canvas.height / 2, angle: 0, vx: 0, vy: 0 };
        let targetY = canvas.height / 2;
        let currentPitch = -1;
        let currentHarmonicity = 1.0;
        
        let vocalizationCount = 0;
        let lastIsVocalizing = false;
        let lastVocalTime = 0;
        const CONTINUE_TIME = 1000; 
        const MOVEMENT_INERTIA_MS = 100;
        
        let timeSeriesData = [];
        let trialTrajectoryToSave = [];
        let startTime = 0;
        let trialStartTime = 0;
        
        const ANIMALS = [
            { id: 'cow', name: 'Cow', sound: 'cat_20.mp3', emoji: '🐮' },
            { id: 'cat', name: 'Cat', sound: 'cat_20.mp3', emoji: '🐱' },
            { id: 'dog', name: 'Dog', sound: 'cat_20.mp3', emoji: '🐶' },
            { id: 'duck', name: 'Duck', sound: 'cat_20.mp3', emoji: '🦆' }
        ];
        let clouds = [];
        let isMovingForwards = true;

        // --- EYE TRACKING (DISABLED) ---
        let gazeX = 0, gazeY = 0, gazeROI = null;
        let smoothedGazeX = canvas.width / 2, smoothedGazeY = canvas.height / 2;
        const GAZE_SMOOTHING = 0.12; 
        let faceMesh;

        /*
        async function initEyeTracking() {
            faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            faceMesh.onResults(onFaceMeshResults);
            const camera = new Camera(webcamPreview, { onFrame: async () => await faceMesh.send({image: webcamPreview}), width: 640, height: 480 });
            camera.start();
        }
        */

        function onFaceMeshResults(results) {
            // Disabled for v2.0
        }

        function collectCalibration(x, y) {
            calibFrameCount++;
            if (calibrationStep === 0) calibrationData.center.push({x, y});
            else if (calibrationStep === 1) calibrationData.tl.push({x, y});
            else if (calibrationStep === 2) calibrationData.br.push({x, y});

            if (calibFrameCount >= CALIB_FRAMES_NEEDED) {
                isCalibratingPoint = false;
                calibFrameCount = 0;
                calibrationStep++;
                if (calibrationStep > 2) finishCalibration();
                else {
                    setTimeout(() => { isCalibratingPoint = true; playSound('cat_20.mp3'); }, 1500);
                }
            }
        }

        function finishCalibration() {
            const getMed = (arr, prop) => {
                const values = arr.map(v => v[prop]).sort((a,b) => a-b);
                return values[Math.floor(values.length / 2)];
            };
            
            const tl = { x: getMed(calibrationData.tl, 'x'), y: getMed(calibrationData.tl, 'y') };
            const br = { x: getMed(calibrationData.br, 'x'), y: getMed(calibrationData.br, 'y') };
            const center = { x: getMed(calibrationData.center, 'x'), y: getMed(calibrationData.center, 'y') };

            // We use the TL and BR to define the box, but we could also use center to verify
            calibOffsets.minX = tl.x;
            calibOffsets.maxX = br.x;
            calibOffsets.minY = tl.y;
            calibOffsets.maxY = br.y;

            console.log("Calibration Finished:", calibOffsets);
            currentPhase = PHASES.BASELINE;
            playSound('cat_20.mp3'); 
        }

        function drawAttractor(ctx, x, y, size) {
            const time = performance.now() * 0.005;
            const bounce = Math.sin(time * 2) * 20;
            ctx.save();
            ctx.translate(x, y + bounce);
            ctx.rotate(time);
            ctx.font = `${size}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('☀️', 0, 0);
            ctx.restore();
        }

        function updateGazeROI(x, y) {
            gazeROI = null;
            clouds.forEach(cloud => {
                if (x > cloud.x && x < cloud.x + cloud.width && y > cloud.y && y < cloud.y + cloud.height) {
                    gazeROI = cloud.id;
                    if (currentPhase === PHASES.TEST && !isTestIntro) revealCloud(cloud, true);
                }
            });
        }

        function revealCloud(cloud, isGaze = false) {
            const revealRadius = isGaze ? 40 : 70;
            const maskCtx = cloud.maskCanvas.getContext('2d');
            maskCtx.globalCompositeOperation = 'destination-out';
            maskCtx.beginPath();
            const relX = (isGaze ? gazeX : balloon.x) - cloud.x;
            const relY = (isGaze ? gazeY : balloon.y) - cloud.y;
            maskCtx.arc(relX, relY, revealRadius, 0, Math.PI * 2);
            maskCtx.fill();
            
            // Sound logic with 200ms delay and cooldown
            const now = performance.now();
            if (!cloud.lastPlayed || now - cloud.lastPlayed > 2000) { // 2s cooldown
                if (!cloud.pendingSound) {
                    cloud.pendingSound = true;
                    setTimeout(() => {
                        playSound(cloud.animal.sound);
                        cloud.lastPlayed = performance.now();
                        cloud.pendingSound = false;
                    }, 200);
                }
            }
        }

        function playSound(soundFile) { 
            const errorEl = document.getElementById('hud-error');
            // Try specific VocSoA route first, then fallback to general sounds
            const audio = new Audio(`/VocSoA/sounds/${soundFile}`);
            audio.onerror = () => {
                const fallback = new Audio(`/sounds/${soundFile}`);
                fallback.onerror = () => {
                    errorEl.innerText = `Sound error: ${soundFile} not found.`;
                    console.error("Sound play failed:", soundFile);
                };
                fallback.play().catch(e => {
                    errorEl.innerText = `Sound error: ${soundFile} failed to play.`;
                });
            };
            audio.play().catch(e => {
                const fallback = new Audio(`/sounds/${soundFile}`);
                fallback.play().catch(err => {
                    errorEl.innerText = `Sound error: ${soundFile} not found.`;
                });
            });
        }

        function determineCondition(group, block, p_id) {
            if (p_id === '1' || p_id === 1) return 'C1';
            if (group === 'G1') return block === 2 ? 'C2' : 'C1';
            if (group === 'G2') return block === 2 ? 'C1' : 'C2';
            if (group === 'G3') return 'C3';
            return 'C1';
        }

        function initClouds() {
            const w = canvas.width, h = canvas.height;
            const regions = [{ id: 0, x: w * 0.1, y: h * 0.1, w: w * 0.4, h: h * 0.4 }, { id: 1, x: w * 0.5, y: h * 0.1, w: w * 0.4, h: h * 0.4 }, { id: 2, x: w * 0.1, y: h * 0.5, w: w * 0.4, h: h * 0.4 }, { id: 3, x: w * 0.5, y: h * 0.5, w: w * 0.4, h: h * 0.4 }];
            const shuffledAnimals = [...ANIMALS].sort(() => Math.random() - 0.5);
            clouds = regions.map((reg, i) => {
                const cloudW = 250, cloudH = 150;
                const mCanvas = document.createElement('canvas'); mCanvas.width = cloudW; mCanvas.height = cloudH;
                const mCtx = mCanvas.getContext('2d'); mCtx.fillStyle = 'white';
                mCtx.beginPath(); mCtx.arc(50, 50, 60, 0, Math.PI * 2); mCtx.arc(120, 40, 70, 0, Math.PI * 2); mCtx.arc(190, 60, 60, 0, Math.PI * 2); mCtx.arc(120, 100, 60, 0, Math.PI * 2); mCtx.fill();
                return { id: reg.id, x: reg.x + Math.random() * (reg.w - cloudW), y: reg.y + Math.random() * (reg.h - cloudH), width: cloudW, height: cloudH, maskCanvas: mCanvas, revealedPercent: 0, animal: shuffledAnimals[i], soundPlayed: false };
            });
        }

        function drawHotAirBalloon(ctx, x, y, angle) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
            ctx.fillStyle = '#8B4513'; ctx.fillRect(-20, 30, 40, 30);
            ctx.strokeStyle = '#000000'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-15, 30); ctx.lineTo(-25, -5); ctx.moveTo(15, 30); ctx.lineTo(25, -5); ctx.stroke();
            const gradient = ctx.createRadialGradient(-10, -30, 10, 0, -20, 60); gradient.addColorStop(0, '#FF4500'); gradient.addColorStop(0.5, '#FFD700'); gradient.addColorStop(1, '#FF4500'); ctx.fillStyle = gradient; ctx.beginPath(); ctx.moveTo(0, 30); ctx.bezierCurveTo(-60, 30, -70, -70, 0, -80); ctx.bezierCurveTo(70, -70, 60, 30, 0, 30); ctx.fill();
            ctx.restore();
        }

        let expRecorder, camRecorder;
        let expChunks = [], camChunks = [];
        function startRecording(stream) {
            const canvasStream = canvas.captureStream(30);
            expRecorder = new MediaRecorder(new MediaStream([...canvasStream.getVideoTracks(), ...stream.getAudioTracks()]), { mimeType: 'video/webm' });
            expChunks = []; expRecorder.ondataavailable = (e) => { if (e.data.size > 0) expChunks.push(e.data); };
            camRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            camChunks = []; camRecorder.ondataavailable = (e) => { if (e.data.size > 0) camChunks.push(e.data); };
            expRecorder.start(); camRecorder.start();
        }

        async function stopAndUploadMedia() {
            return new Promise((resolve) => {
                let count = 0; const checkDone = () => { count++; if (count === 2) resolve(); };
                expRecorder.onstop = async () => { const blob = new Blob(expChunks, { type: 'video/webm' }); const formData = new FormData(); formData.append('participant_id', participantId); formData.append('file_type', `webm_G${groupAssignment}`); formData.append('trial_number', trialNumber); formData.append('file', blob, 'experiment.webm'); await fetch('/api/save_data', { method: 'POST', body: formData }); checkDone(); };
                camRecorder.onstop = async () => { const blob = new Blob(camChunks, { type: 'video/webm' }); const formData = new FormData(); formData.append('participant_id', participantId); formData.append('file_type', `webm_webcam_G${groupAssignment}`); formData.append('trial_number', trialNumber); formData.append('file', blob, 'webcam.webm'); await fetch('/api/save_data', { method: 'POST', body: formData }); checkDone(); };
                expRecorder.stop(); camRecorder.stop();
            });
        }

        async function saveTrialData(isFinal = false) {
            await stopAndUploadMedia();
            if (currentCondition === "C1") {
                const trajData = { participant_id: participantId, trial_number: trialNumber, group: groupAssignment, condition: "C1", trajectory: trialTrajectoryToSave, trial_duration_ms: performance.now() - trialStartTime, recorded_at: new Date().toISOString() };
                await fetch('/api/save_trajectory', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(trajData) });
            }
            const headers = "Participant_number,phase,Assigned_group,Trial_number,Block_number,Actual_condition,Yoked_source_p,Yoked_source_trial,pitch_hz,harmonicity,timestamp_ms,balloon_x,balloon_y,balloon_vx,balloon_vy,is_vocalizing,gaze_x,gaze_y,Gaze_ROI,Cloud_reveal_id,Reveal_percentage,Trial_start_time,Trial_elapsed_ms\n";
            const csvContent = headers + timeSeriesData.map(d => [participantId, d.phase, groupAssignment, trialNumber, blockNumber, currentCondition, yokedSource.p_id, yokedSource.trial_n, d.p, d.h, d.t_absolute, d.bx, d.by, d.bvx, d.bvy, d.v, d.gx, d.gy, d.groi, d.reveal_id, d.reveal_pct, trialStartTime.toFixed(2), d.t_elapsed].join(',')).join('\n');
            const formData = new FormData(); formData.append('participant_id', participantId); formData.append('file_type', `csv_G${groupAssignment}`); formData.append('trial_number', trialNumber); formData.append('file', new Blob([csvContent], { type: 'text/csv' }), 'data.csv');
            await fetch('/api/save_data', { method: 'POST', body: formData });
            timeSeriesData = []; trialTrajectoryToSave = []; if (!isFinal) startRecording(micStream);
        }

        startButton.addEventListener('click', async () => {
            // Values are already set by initSession()
            blockNumber = 1; trialNumber = 1; 
            currentCondition = determineCondition(groupAssignment, blockNumber, participantId);
            
            if (audioContext) return; 
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, autoGainControl: false, noiseSuppression: false } });
                
                // Show pitch HUD
                document.getElementById('pitch-hud').style.display = 'block';

                audioContext = new (window.AudioContext || window.webkitAudioContext)(); analyser = audioContext.createAnalyser(); analyser.fftSize = 2048; microphone = audioContext.createMediaStreamSource(micStream); microphone.connect(analyser);
                uiContainer.style.display = 'none'; stopButton.style.display = 'block';
                
                balloon.x = 100; balloon.y = canvas.height / 2; 
                currentPhase = PHASES.BASELINE; 
                experimentStarted = true;
                startTime = performance.now(); trialStartTime = startTime;
                startRecording(micStream); drawLoop();
            } catch (err) { console.error(err); alert('Permissions denied.'); }
        });

        stopButton.addEventListener('click', async () => { await stopExperiment(); });
        async function stopExperiment() { if (!experimentStarted) return; experimentStarted = false; await saveTrialData(true); alert("Experiment Finished."); location.reload(); }

        // --- CONDITION LOGIC ---
        function determineCondition(group, block, p_id) {
            if (p_id === '1' || p_id === 1 || group === 'SEED') return 'C1';
            if (group === 'G1') return block === 2 ? 'C2' : 'C1';
            if (group === 'G2') return block === 2 ? 'C1' : 'C2';
            return 'C1';
        }

        async function fetchYokedTrajectory() {
            try {
                const response = await fetch(`/api/get_yoked_trajectory?participant_id=${participantId}&trial_number=${trialNumber}`);
                if (response.ok) { const res = await response.json(); yokedTrajectoryData = res.data.trajectory; yokedSource = { p_id: res.source_p_id, trial_n: res.source_trial_n }; yokedIndex = 0; }
            } catch (err) { yokedSource = { p_id: "Fallback", trial_n: "N/A" }; }
        }

        function yinAlgorithm(buffer, sampleRate) {
            let halfBufferSize = Math.floor(buffer.length / 2); let yinBuffer = new Float32Array(halfBufferSize);
            for (let tau = 0; tau < halfBufferSize; tau++) { for (let i = 0; i < halfBufferSize; i++) { let delta = buffer[i] - buffer[i + tau]; yinBuffer[tau] += delta * delta; } }
            let runningSum = 0; yinBuffer[0] = 1; for (let tau = 1; tau < halfBufferSize; tau++) { runningSum += yinBuffer[tau]; yinBuffer[tau] *= tau / runningSum; }
            let tauEstimate = -1; let aperiodicity = 1.0; for (let tau = 2; tau < halfBufferSize; tau++) { if (yinBuffer[tau] < APERIODICITY_THRESHOLD) { while (tau + 1 < halfBufferSize && yinBuffer[tau + 1] < yinBuffer[tau]) tau++; tauEstimate = tau; aperiodicity = yinBuffer[tau]; break; } }
            if (tauEstimate === -1) return { pitch: -1, aperiodicity: 1.0 }; return { pitch: sampleRate / tauEstimate, aperiodicity: aperiodicity };
        }

        function updatePitchHUD(pitch, rms, aperiodicity, isVocalizing, reason = "") {
            const hudPitch = document.getElementById('hud-pitch');
            const hudVol = document.getElementById('hud-vol');
            const hudAp = document.getElementById('hud-ap');
            const hudStatus = document.getElementById('hud-status');
            const hudErr = document.getElementById('hud-error');

            hudPitch.innerText = pitch > 0 ? pitch.toFixed(0) : "--";
            hudVol.innerText = rms.toFixed(4);
            hudAp.innerText = aperiodicity.toFixed(3);
            
            if (isVocalizing) {
                hudStatus.innerText = "Status: VOCALIZING";
                hudStatus.style.color = "#00FF00";
                hudErr.innerText = "";
            } else {
                hudStatus.innerText = "Status: Silent/Filtered";
                hudStatus.style.color = "white";
                hudErr.innerText = reason;
            }

            // Highlight errors in red
            hudPitch.style.color = (pitch > 0 && (pitch < MIN_PITCH || pitch > MAX_PITCH)) ? "#FF4444" : "white";
            hudVol.style.color = (rms < VOLUME_THRESHOLD) ? "#FF4444" : "white";
            hudAp.style.color = (aperiodicity > APERIODICITY_THRESHOLD) ? "#FF4444" : "white";
        }

        let lastPitchForContour = -1;
        let cloudTimers = {}; // To handle the 200ms delay

        function drawLoop() {
            if (!experimentStarted) return;
            requestAnimationFrame(drawLoop);

            const now = performance.now();
            
            // --- TEST PHASE (2s after each trial) ---
            if (isTestPhase) {
                if (now - testPhaseStartTime > 2000) {
                    isTestPhase = false;
                    // Reset for next trial
                    trialNumber++;
                    if (trialNumber > 10) {
                        blockNumber++;
                        trialNumber = 1;
                    }
                    if (blockNumber > 3) {
                        stopExperiment();
                        return;
                    }
                    currentCondition = determineCondition(groupAssignment, blockNumber, participantId);
                    isMovingForwards = true;
                    vocalizationCount = 0;
                    trialStartTime = now;
                    initClouds(); 
                    if (currentCondition !== "C1") fetchYokedTrajectory();
                } else {
                    // Show test phase visuals
                    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.font = '40px Arial';
                    ctx.fillText("TEST PHASE", canvas.width/2, canvas.height/2);
                    return; 
                }
            }

            const buffer = new Float32Array(analyser.fftSize); 
            analyser.getFloatTimeDomainData(buffer);
            let sum = 0; for(let i=0; i<buffer.length; i++) sum += buffer[i]*buffer[i];
            const rms = Math.sqrt(sum/buffer.length);
            const result = yinAlgorithm(buffer, audioContext.sampleRate);
            
            let isVocalizing = false;
            let filterReason = "";

            if (rms < VOLUME_THRESHOLD) filterReason = "Volume too low";
            else if (result.pitch < MIN_PITCH || result.pitch > MAX_PITCH) filterReason = "Pitch out of range";
            else if (result.aperiodicity > APERIODICITY_THRESHOLD) filterReason = "Aperiodicity too high";
            else {
                isVocalizing = true;
                pitchHistory.push(result.pitch);
                if (pitchHistory.length > 5) pitchHistory.shift();
                const sorted = [...pitchHistory].sort((a,b) => a-b);
                currentPitch = sorted[Math.floor(sorted.length/2)];
                currentHarmonicity = 1.0 - result.aperiodicity;
                lastVocalTime = now;
            }

            updatePitchHUD(result.pitch, rms, result.aperiodicity, isVocalizing, filterReason);

            if (isVocalizing && !lastIsVocalizing) {
                vocalizationCount++;
                if (currentPhase === PHASES.BASELINE && vocalizationCount >= 5) {
                    currentPhase = PHASES.EXPLORATION;
                    initClouds();
                    if (currentCondition !== "C1") fetchYokedTrajectory();
                }
            }
            lastIsVocalizing = isVocalizing;

            let timeSinceVocal = now - lastVocalTime;
            let moving = false;

            if (currentPhase === PHASES.EXPLORATION || currentPhase === PHASES.BASELINE) {
                if (currentCondition === "C1" || currentPhase === PHASES.BASELINE) {
                    if (isVocalizing || timeSinceVocal < MOVEMENT_INERTIA_MS) {
                        moving = true;
                        // Vertical movement based on contour
                        if (lastPitchForContour > 0 && currentPitch > 0) {
                            const diff = currentPitch - lastPitchForContour;
                            balloon.vy = -diff * 0.5; // Up if pitch increases
                        }
                        lastPitchForContour = currentPitch;
                        
                        // Advance slowly
                        balloon.vx = isMovingForwards ? 2 : -2;
                    } else {
                        balloon.vx = 0;
                        balloon.vy *= 0.9; // Friction
                        lastPitchForContour = -1;
                    }
                } else if ((currentCondition === "C2" || currentCondition === "C3") && yokedTrajectoryData) {
                    // Yoked playback
                    if (currentCondition === "C3" || isVocalizing || timeSinceVocal < MOVEMENT_INERTIA_MS) {
                        moving = true;
                        const d = yokedTrajectoryData[yokedIndex];
                        balloon.x = d.balloon_x;
                        balloon.y = d.balloon_y;
                        yokedIndex = Math.min(yokedTrajectoryData.length - 1, yokedIndex + 1);
                    }
                }
            }

            if (moving && !isTestPhase && (currentCondition === "C1" || currentPhase === PHASES.BASELINE)) {
                balloon.x += balloon.vx;
                balloon.y += balloon.vy;
                const padding = 60;
                balloon.x = Math.max(padding, Math.min(canvas.width - padding, balloon.x));
                balloon.y = Math.max(padding, Math.min(canvas.height - padding, balloon.y));
                
                if (isMovingForwards && balloon.x >= canvas.width - padding) {
                    isMovingForwards = false;
                } else if (!isMovingForwards && balloon.x <= padding) {
                    // Trial Complete
                    saveTrialData().then(() => {
                        isTestPhase = true;
                        testPhaseStartTime = performance.now();
                        yokedIndex = 0;
                    });
                }
            } else if (moving && (currentCondition === "C2" || currentCondition === "C3")) {
                if (yokedIndex >= yokedTrajectoryData.length - 1) {
                    saveTrialData().then(() => {
                        isTestPhase = true;
                        testPhaseStartTime = performance.now();
                        yokedIndex = 0;
                    });
                }
            }

            // Cloud Overlap with 200ms delay
            let activeRevealId = null, activeRevealPct = 0;
            if (currentPhase === PHASES.EXPLORATION) {
                clouds.forEach(cloud => {
                    let dist = Math.sqrt((balloon.x - (cloud.x + cloud.width/2))**2 + (balloon.y - (cloud.y + cloud.height/2))**2);
                    if (dist < 130) {
                        if (!cloudTimers[cloud.id]) {
                            cloudTimers[cloud.id] = setTimeout(() => {
                                revealCloud(cloud);
                                delete cloudTimers[cloud.id];
                            }, 200);
                        }
                        activeRevealId = cloud.id;
                        activeRevealPct = cloud.revealedPercent;
                    } else {
                        if (cloudTimers[cloud.id]) {
                            clearTimeout(cloudTimers[cloud.id]);
                            delete cloudTimers[cloud.id];
                        }
                    }
                });
            }

            timeSeriesData.push({ t_absolute: (now - startTime).toFixed(2), t_elapsed: (now - trialStartTime).toFixed(2), p: currentPitch.toFixed(2), h: currentHarmonicity.toFixed(4), bx: balloon.x.toFixed(2), by: balloon.y.toFixed(2), bvx: balloon.vx.toFixed(2), bvy: balloon.vy.toFixed(2), v: isVocalizing ? "True" : "False", gx: 0, gy: 0, groi: "null", reveal_id: activeRevealId === null ? "null" : activeRevealId, reveal_pct: activeRevealPct.toFixed(2), phase: currentPhase });
            if (currentCondition === "C1") trialTrajectoryToSave.push({timestamp_ms: now - trialStartTime, balloon_x: balloon.x, balloon_y: balloon.y});

            // --- RENDERING ---
            ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (currentPhase === PHASES.EXPLORATION || currentPhase === PHASES.TEST) {
                clouds.forEach(cloud => {
                    ctx.font = '80px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(cloud.animal.emoji, cloud.x + cloud.width/2, cloud.y + cloud.height/2);
                    ctx.drawImage(cloud.maskCanvas, cloud.x, cloud.y);
                });
            }
            drawHotAirBalloon(ctx, balloon.x, balloon.y, 0);

            ctx.fillStyle = 'white'; ctx.textAlign = 'left'; ctx.font = '20px Arial';
            ctx.fillText(`Phase: ${currentPhase} | Trial: ${trialNumber}/10 | Block: ${blockNumber}/3`, 20, 30);
            ctx.fillText(`Condition: ${currentCondition} | Vocals: ${vocalizationCount}`, 20, 60);
        }

        // Escape to terminate
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                stopExperiment();
            }
        });
    </script>
</body>
