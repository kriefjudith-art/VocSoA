<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Pitch Agency - Smooth JS Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #87CEEB; /* Sky blue */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            overflow: hidden;
        }
        #ui-container {
            position: absolute;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            color: #FF4500;
            margin-top: 0;
            font-size: 32px;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            background-color: #FF1493; /* Hot pink */
            color: white;
            border: none;
            border-radius: 50px;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 6px 0 #C71585;
        }
        button:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #C71585;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>🐥 Super Baby Bird!</h1>
        <p>Pure Pitch Control. Smooth 60 FPS.</p>
        <button id="startButton">Start Microphone</button>
    </div>
    
    <canvas id="visualizer"></canvas>

    <script>
        const startButton = document.getElementById('startButton');
        const uiContainer = document.getElementById('ui-container');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let audioContext, analyser, microphone;
        
        // --- BABY STUDY SETTINGS ---
        const MIN_PITCH = 150; 
        const MAX_PITCH = 1200; 
        const APERIODICITY_THRESHOLD = 0.2; // Stricter harmonicity (ignores noise)
        
        let bird = { x: 100, y: canvas.height / 2, angle: 0 };
        let targetY = canvas.height / 2;
        let trajectoryPath = [];
        let currentPitch = -1;

        startButton.addEventListener('click', async () => {
            if (audioContext) return; 

            try {
                // Request raw, unprocessed audio for better pitch detection
                const constraints = { 
                    audio: { 
                        echoCancellation: false, 
                        autoGainControl: false, 
                        noiseSuppression: false 
                    } 
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048; 
                
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                uiContainer.style.display = 'none';
                
                drawLoop();
            } catch (err) {
                console.error('Error accessing microphone:', err);
                alert('Could not access microphone.');
            }
        });

        // --- THE YIN ALGORITHM (Ported to fast JavaScript) ---
        function yinAlgorithm(buffer, sampleRate) {
            let halfBufferSize = Math.floor(buffer.length / 2);
            let yinBuffer = new Float32Array(halfBufferSize);

            // Step 1: Difference function
            for (let tau = 0; tau < halfBufferSize; tau++) {
                for (let i = 0; i < halfBufferSize; i++) {
                    let delta = buffer[i] - buffer[i + tau];
                    yinBuffer[tau] += delta * delta;
                }
            }

            // Step 2: Cumulative mean normalized difference
            let runningSum = 0;
            yinBuffer[0] = 1;
            for (let tau = 1; tau < halfBufferSize; tau++) {
                runningSum += yinBuffer[tau];
                yinBuffer[tau] *= tau / runningSum;
            }

            // Step 3: Absolute threshold
            let tauEstimate = -1;
            let aperiodicity = 1.0;
            
            for (let tau = 2; tau < halfBufferSize; tau++) {
                if (yinBuffer[tau] < APERIODICITY_THRESHOLD) {
                    while (tau + 1 < halfBufferSize && yinBuffer[tau + 1] < yinBuffer[tau]) {
                        tau++;
                    }
                    tauEstimate = tau;
                    aperiodicity = yinBuffer[tau];
                    break;
                }
            }

            if (tauEstimate === -1) return { pitch: -1, aperiodicity: 1.0 };
            return { pitch: sampleRate / tauEstimate, aperiodicity: aperiodicity };
        }

        // --- DRAW THE SUPERHERO BIRD ---
        function drawCoolBird(ctx, x, y, angle, time, isFlying) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            // 1. Draw Cape (Flaps using Sine wave if flying)
            let capeFlap = isFlying ? Math.sin(time * 0.02) * 15 : 0;
            ctx.fillStyle = '#DC143C'; // Crimson Red
            ctx.beginPath();
            ctx.moveTo(-20, -10);
            ctx.lineTo(-60, -20);
            ctx.lineTo(-50, 30 + capeFlap);
            ctx.fill();

            // 2. Draw Body (Bright Yellow)
            ctx.fillStyle = '#FFD700'; 
            ctx.beginPath();
            ctx.arc(0, 0, 45, 0, Math.PI * 2);
            ctx.fill();

            // 3. Draw Animated Wing
            let wingY = isFlying ? Math.sin(time * 0.03) * 15 : 0;
            ctx.fillStyle = '#FFA500'; // Orange
            ctx.beginPath();
            ctx.ellipse(-15, 5 + wingY, 25, 12, Math.PI / 8, 0, Math.PI * 2);
            ctx.fill();

            // 4. Draw Sunglasses
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(10, -15, 12, 0, Math.PI * 2); // Left lens
            ctx.arc(35, -15, 12, 0, Math.PI * 2); // Right lens
            ctx.fill();
            
            ctx.strokeStyle = '#000000'; // Glasses bridge
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(10, -15);
            ctx.lineTo(35, -15);
            ctx.stroke();

            // Sunglasses reflections
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(7, -18, 3, 0, Math.PI * 2);
            ctx.arc(32, -18, 3, 0, Math.PI * 2);
            ctx.fill();

            // 5. Draw Beak
            ctx.fillStyle = '#FF8C00'; // Dark Orange
            ctx.beginPath();
            ctx.moveTo(40, -5);
            ctx.lineTo(65, 5);
            ctx.lineTo(40, 15);
            ctx.fill();

            ctx.restore();
        }

        function drawLoop() {
            requestAnimationFrame(drawLoop);

            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            
            // Apply JS YIN Algorithm
            const result = yinAlgorithm(buffer, audioContext.sampleRate);
            
            let isVocalizing = false;

            // Strict checking: Is it a clear voice? Is it in the baby range?
            if (result.pitch !== -1 && result.aperiodicity < APERIODICITY_THRESHOLD) {
                if (result.pitch >= MIN_PITCH && result.pitch <= MAX_PITCH) {
                    currentPitch = result.pitch;
                    isVocalizing = true;
                }
            }

            // --- UPDATE STATE ---
            if (isVocalizing) {
                bird.x += 6; 

                // Map pitch to screen height (high pitch = top)
                let normalizedPitch = (currentPitch - MIN_PITCH) / (MAX_PITCH - MIN_PITCH);
                normalizedPitch = Math.max(0.1, Math.min(0.9, normalizedPitch)); 
                targetY = canvas.height - (normalizedPitch * canvas.height);
                
                trajectoryPath.push({ x: bird.x, y: bird.y });
            }

            // Smooth interpolation
            let dy = targetY - bird.y;
            bird.y += dy * 0.15;

            // Tilt mechanic
            let targetAngle = isVocalizing ? (dy * 0.01) : 0;
            bird.angle += (targetAngle - bird.angle) * 0.2;

            // Loop screen
            if (bird.x > canvas.width + 60) {
                bird.x = 0;
                trajectoryPath = []; 
            }

            // --- DRAWING ---
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Trajectory (Candy Stripe)
            if (trajectoryPath.length > 1) {
                ctx.beginPath();
                ctx.moveTo(trajectoryPath[0].x, trajectoryPath[0].y);
                for (let i = 1; i < trajectoryPath.length; i++) {
                    ctx.lineTo(trajectoryPath[i].x, trajectoryPath[i].y);
                }
                
                // Outer pink glow
                ctx.strokeStyle = '#FF1493'; 
                ctx.lineWidth = 16;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                
                // Inner white line
                ctx.strokeStyle = '#FFFFFF'; 
                ctx.lineWidth = 6;
                ctx.stroke();
            }

            // Draw the Super Bird!
            const time = performance.now();
            drawCoolBird(ctx, bird.x, bird.y, bird.angle, time, isVocalizing);
        }
    </script>
</body>
</html>
